<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THANIMA IYKARAYIL MOTOR DRIVING SCHOOL - Console</title>
    <style>
        :root {
            --bg-main: #0b132b;
            --bg-card: #1c2541;
            --bg-input: #3a506b;
            --accent-cyan: #00b4d8;
            --accent-blue: #5bc0be;
            --text-light: #f4f5f7;
            --text-muted: #9fa8da;
            --border-color: #2e3b5e;
            --success-green: #06d6a0;
            --error-red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-light); }

        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }

        .dashboard-container { display: flex; flex-direction: column; min-height: 100vh; }
        @media (min-width: 992px) { .dashboard-container { flex-direction: row; } }

        .sidebar-panel { width: 100%; background-color: #0d1b2a; padding: 15px; border-bottom: 1px solid var(--border-color); }
        @media (min-width: 992px) { .sidebar-panel { width: 280px; border-right: 1px solid var(--border-color); } }

        .main-content-view { flex-grow: 1; padding: 30px; }
        .panel { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .btn { background-color: var(--accent-cyan); color: var(--bg-main); padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        
        .tab-page { display: none; }
        .tab-page.active { display: block; }
        .menu-item { padding: 15px; cursor: pointer; color: var(--text-muted); border-left: 4px solid transparent; }
        .menu-item.active { color: var(--accent-cyan); border-left: 4px solid var(--accent-cyan); background: rgba(0, 180, 216, 0.1); }
        
        .folder-box { border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 12px; background: #151d33; }
        .folder-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .folder-content { display: none; padding: 15px; background: #0f1626; }
        .folder-content.open { display: block; }
        .nested-payment-card { background: var(--bg-card); padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2>System Authentication</h2>
            <input type="text" id="loginUser" placeholder="Operator ID" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="password" id="loginPass" placeholder="Passcode" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn" onclick="handleAuthSubmit()">Unlock Workspace</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="sidebar-panel">
            <h3>THANIMA IYKARAYIL MOTOR DRIVING SCHOOL</h3>
            <ul style="list-style: none; margin-top: 20px;">
                <li class="menu-item active" id="nav-billing" onclick="switchConsoleTab('billing')">🧾 Terminal Billing</li>
                <li class="menu-item" id="nav-students" onclick="switchConsoleTab('students')">📁 Student Archives</li>
            </ul>
        </div>
        <div class="main-content-view">
            <div id="tab-billing" class="tab-page active">
                <div class="panel">
                    <div id="dbStatusLabel" style="margin-bottom:10px;">Status: Ready</div>
                    <input type="text" id="custName" placeholder="Student Name" style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="text" id="whatsappNo" placeholder="WhatsApp No" style="width:100%; padding:10px; margin-bottom:10px;">
                    <input type="number" id="amount" placeholder="Amount" style="width:100%; padding:10px; margin-bottom:10px;">
                    <button class="btn" onclick="sendWhatsApp()">Dispatch Receipt</button>
                </div>
            </div>
            <div id="tab-students" class="tab-page">
                <div class="panel">
                    <input type="text" id="historySearch" placeholder="Search students..." oninput="loadGroupedStudents()" style="width:100%; padding:10px; margin-bottom:15px;">
                    <div id="groupedFoldersContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzTJs5UfDsMl5bWAkKsreefaOzUH2_ckJnR9TleIsJZWj1AJspoV3ECFDEis-OwuaxC/exec";

        window.onload = function() {
            if(sessionStorage.getItem('auth_state') === 'verified') document.getElementById('loginScreen').style.display = 'none';
            fetchSheetsCloudData();
        }

        function handleAuthSubmit() {
            if (document.getElementById('loginUser').value === 'Arun9666' && document.getElementById('loginPass').value === 'A6669n') {
                sessionStorage.setItem('auth_state', 'verified');
                document.getElementById('loginScreen').style.display = 'none';
            } else { alert("Invalid credentials"); }
        }

        function switchConsoleTab(tabId) {
            document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        function fetchSheetsCloudData() {
            const script = document.createElement('script');
            script.src = googleScriptUrl + "?callback=handleSheetsCloudResponse&ts=" + new Date().getTime();
            document.body.appendChild(script);
        }

        window.handleSheetsCloudResponse = function(data) {
            if (!Array.isArray(data)) return loadGroupedStudents();
            const cleaned = data.filter(row => row.name && row.phone);
            localStorage.setItem("driving_school_history", JSON.stringify(cleaned));
            document.getElementById("dbStatusLabel").innerHTML = "Status : Google Sheets Synced ✅";
            loadGroupedStudents();
        }

        function loadGroupedStudents() {
            const history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
            const groups = {};

            history.forEach(item => {
                const key = item.name.trim().toLowerCase() + "_" + item.phone.replace(/\D/g, '');
                if (!groups[key]) groups[key] = { name: item.name, transactions: [] };
                groups[key].transactions.push(item);
            });

            let objectRows = Object.values(groups);

            objectRows.forEach(group => {
                group.totalPaid = group.transactions.reduce((sum, t) => sum + parseFloat(t.amount || 0), 0);
                group.transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            });

            objectRows.sort((a, b) => new Date(b.transactions[0].date) - new Date(a.transactions[0].date));

            const container = document.getElementById('groupedFoldersContainer');
            container.innerHTML = objectRows.map((g, i) => `
                <div class="folder-box">
                    <div class="folder-header" onclick="document.getElementById('f${i}').classList.toggle('open')">
                        <strong>${g.name.toUpperCase()}</strong>
                        <span class="total-badge" style="background:rgba(0,180,216,0.2); padding:5px; border-radius:4px;">
                            💰 Total Paid : ₹ ${g.totalPaid} (${g.transactions.length} Payments)
                        </span>
                    </div>
                    <div class="folder-content" id="f${i}">
                        ${g.transactions.map(t => `<div class="nested-payment-card">Date: ${t.date} | ₹ ${t.amount}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function sendWhatsApp() {
            const name = document.getElementById('custName').value;
            const message = `*THANIMA IYKARAYIL MOTOR DRIVING SCHOOL*\n\nThank you for choosing THANIMA IYKARAYIL MOTOR DRIVING SCHOOL.`;
            alert("Receipt message prepared for " + name);
        }
    </script>
</body>
</html>
