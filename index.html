<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THANIMA IYKARAYIL MDS - Console</title>
    <style>
        :root {
            --bg-main: #0b132b;
            --bg-card: #1c2541;
            --bg-input: #3a506b;
            --accent-cyan: #00b4d8;
            --accent-blue: #5bc0be;
            --text-light: #f4f5f7;
            --text-muted: #9fa8da;
            --border-color: #2e3b5e;
            --success-green: #06d6a0;
            --error-red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-light); }
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        .dashboard-container { display: flex; min-height: 100vh; flex-direction: column; }
        @media (min-width: 992px) { .dashboard-container { flex-direction: row; } }
        .sidebar-panel { width: 100%; background-color: #0d1b2a; padding: 15px; border-bottom: 1px solid var(--border-color); }
        @media (min-width: 992px) { .sidebar-panel { width: 280px; min-height: 100vh; border-bottom: none; border-right: 1px solid var(--border-color); } }
        .main-content-view { flex-grow: 1; padding: 30px; }
        .panel { background: var(--bg-card); padding: 20px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .btn { background-color: var(--accent-cyan); color: var(--bg-main); padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        .tab-page { display: none; }
        .tab-page.active { display: block; }
        .menu-item { padding: 15px; cursor: pointer; color: var(--text-muted); }
        .menu-item.active { color: var(--accent-cyan); border-left: 4px solid var(--accent-cyan); background: rgba(0, 180, 216, 0.1); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2>System Authentication</h2>
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Operator ID</label>
                <input type="text" id="loginUser" style="width:100%; padding:10px; margin-top:5px;">
            </div>
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Passcode</label>
                <input type="password" id="loginPass" style="width:100%; padding:10px; margin-top:5px;">
            </div>
            <button class="btn" onclick="handleAuthSubmit()">Unlock Workspace</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="sidebar-panel">
            <h3>THANIMA IYKARAYIL MDS</h3>
            <ul style="list-style: none; margin-top: 20px;">
                <li class="menu-item active" id="nav-billing" onclick="switchConsoleTab('billing')">🧾 Terminal Billing</li>
                <li class="menu-item" id="nav-students" onclick="switchConsoleTab('students')">📁 Student Archives</li>
            </ul>
        </div>
        <div class="main-content-view">
            <div id="tab-billing" class="tab-page active">
                <div class="panel">
                    <div id="dbStatusLabel">Status: Ready</div>
                    <form id="receiptForm" onsubmit="event.preventDefault();">
                        <label>Student Name</label>
                        <input type="text" id="custName" style="width:100%; padding:10px; margin-bottom:10px;">
                        <button class="btn" onclick="sendWhatsApp()">Dispatch Receipt</button>
                    </form>
                </div>
            </div>
            <div id="tab-students" class="tab-page">
                <div class="panel" id="groupedFoldersContainer">Loading data...</div>
            </div>
        </div>
    </div>

    <script>
        const googleScriptUrl = "https://script.google.com/macros/s/AKfycbzTJs5UfDsMl5bWAkKsreefaOzUH2_ckJnR9TleIsJZWj1AJspoV3ECFDEis-OwuaxC/exec";

        window.onload = function() {
            if(sessionStorage.getItem('auth_state') === 'verified') document.getElementById('loginScreen').style.display = 'none';
            fetchSheetsCloudData();
        }

        function handleAuthSubmit() {
            if (document.getElementById('loginUser').value === 'Arun9666' && document.getElementById('loginPass').value === 'A6669n') {
                sessionStorage.setItem('auth_state', 'verified');
                document.getElementById('loginScreen').style.display = 'none';
            } else { alert("Invalid credentials"); }
        }

        function switchConsoleTab(tabId) {
            document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        function fetchSheetsCloudData() {
            const label = document.getElementById('dbStatusLabel');
            const script = document.createElement('script');
            script.src = googleScriptUrl + "?callback=handleSheetsCloudResponse&ts=" + new Date().getTime();
            script.onerror = () => label.innerText = "Status: Connection Error";
            document.body.appendChild(script);
        }

        window.handleSheetsCloudResponse = function(data) {
            localStorage.setItem('driving_school_history', JSON.stringify(data));
            document.getElementById('dbStatusLabel').innerText = "Status: Sync Complete ✅";
            loadGroupedStudents();
        };

        function loadGroupedStudents() {
            const history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
            const container = document.getElementById('groupedFoldersContainer');
            container.innerHTML = history.map(item => `<div>${item.name} - ₹${item.amount}</div>`).join('');
        }

        function sendWhatsApp() {
            const name = document.getElementById('custName').value;
            alert("Receipt dispatched for: " + name);
        }
    </script>
</body>
</html>
