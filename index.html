<script>
    let expandedBoxes = {};

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('bill')) {
            renderOnlineInvoiceMode(urlParams);
        } else {
            generateNewReceiptNo();
            updatePreview();
            loadHistory();
        }
    }

    function generateNewReceiptNo() {
        document.getElementById('receiptNo').value = 'TI-' + Math.floor(10000 + Math.random() * 90000);
    }

    function updatePreview() {
        if(document.body.classList.contains('customer-view-mode')) return;

        const receiptNo = document.getElementById('receiptNo').value;
        const name = document.getElementById('custName').value || '____________________';
        const course = document.getElementById('course').value;
        const amount = document.getElementById('amount').value || '0'; // Fixed fallback structure
        const mode = document.getElementById('payMode').value;
        const date = new Date().toLocaleDateString('en-IN');

        document.getElementById('previewReceiptNo').innerText = 'Receipt No: ' + receiptNo;
        document.getElementById('previewDate').innerText = 'Date: ' + date;
        document.getElementById('previewName').innerText = name;
        document.getElementById('previewCourse').innerText = course;
        document.getElementById('previewMode').innerText = mode;
        document.getElementById('previewAmount').innerText = '₹ ' + amount;
    }

    function saveRecordToHistory() {
        const receiptNo = document.getElementById('receiptNo').value;
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('whatsappNo').value.trim();
        const course = document.getElementById('course').value;
        const amount = parseFloat(document.getElementById('amount').value || 0);
        const mode = document.getElementById('payMode').value;
        const date = new Date().toLocaleDateString('en-IN');

        if(!name || !phone || !amount) return false;

        const id = 'ID-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        const record = { id, date, receiptNo, name, phone, course, amount, mode };
        
        let history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
        history.unshift(record); 
        localStorage.setItem('driving_school_history', JSON.stringify(history));
        
        loadHistory();
        return true;
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
        const searchQuery = document.getElementById('historySearch').value.toLowerCase().trim();
        const container = document.getElementById('groupedLedgerContainer');
        
        if(history.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: #64748b; padding: 20px;">No transaction profiles found on this device.</div>`;
            return;
        }

        const groups = {};
        history.forEach(item => {
            const key = `${item.name.toLowerCase()}_${item.phone}`;
            if (!groups[key]) {
                groups[key] = {
                    name: item.name,
                    phone: item.phone,
                    totalPaid: 0,
                    payments: []
                };
            }
            groups[key].payments.push(item);
            groups[key].totalPaid += item.amount;
        });

        let objectRows = Object.values(groups);
        if (searchQuery) {
            objectRows = objectRows.filter(group => 
                group.name.toLowerCase().includes(searchQuery) || 
                group.phone.includes(searchQuery)
            );
        }

        if(objectRows.length === 0) {
            container.innerHTML = `<div style="text-align: center; color: #64748b; padding: 20px;">No matching logs found.</div>`;
            return;
        }

        container.innerHTML = objectRows.map((group, index) => {
            const boxId = `ledger-${index}`;
            const isOpen = expandedBoxes[boxId] ? 'open' : '';
            
            const innerRowsHtml = group.payments.map(pay => `
                <div class="inner-payment-item">
                    <div>
                        <strong>${pay.date}</strong> - <span style="color:var(--brand-teal); font-weight:600;">${pay.receiptNo}</span> | 
                        ${pay.course} (${pay.mode})
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <strong style="color:var(--brand-dark-teal)">₹ ${pay.amount}</strong>
                        <button type="button" class="delete-single-btn" onclick="deleteSinglePayment('${pay.id}', event)">❌ Delete</button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="student-row">
                    <div class="student-summary" onclick="toggleLedgerBox('${boxId}')">
                        <div class="student-info">
                            <span class="student-name">${group.name}</span>
                            <span class="student-phone">📞 +91 ${group.phone}</span>
                        </div>
                        <div class="student-meta">
                            <span class="count-badge">${group.payments.length} Payments</span>
                            <span class="total-badge">Total: ₹ ${group.totalPaid}</span>
                            <span style="font-size: 0.8rem; color:#64748b;">▼</span>
                        </div>
                    </div>
                    <div class="payments-detail-box ${isOpen}" id="${boxId}">
                        ${innerRowsHtml}
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleLedgerBox(id) {
        const box = document.getElementById(id);
        if(box.classList.contains('open')) {
            box.classList.remove('open');
            expandedBoxes[id] = false;
        } else {
            box.classList.add('open');
            expandedBoxes[id] = true;
        }
    }

    function deleteSinglePayment(targetId, event) {
        if(event) {
            event.stopPropagation();
            event.preventDefault();
        }

        if(!confirm("Are you sure you want to delete this specific receipt payment record?")) return;

        let history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
        history = history.filter(item => item.id !== targetId);
        localStorage.setItem('driving_school_history', JSON.stringify(history));
        loadHistory();
    }

    function clearAllHistory() {
        if(confirm("Danger! Are you sure you want to completely erase your ledger history profiles? This cannot be undone.")) {
            localStorage.removeItem('driving_school_history');
            expandedBoxes = {};
            loadHistory();
        }
    }

    function exportToExcel() {
        const history = JSON.parse(localStorage.getItem('driving_school_history')) || [];
        if (history.length === 0) {
            alert("There are no records available to export into Excel.");
            return;
        }

        let excelContent = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="UTF-8"></head>
            <body>
            <table border="1">
                <tr style="background-color: #005f73; color: white; font-weight: bold;">
                    <th>Date</th>
                    <th>Receipt Number</th>
                    <th>Student Name</th>
                    <th>WhatsApp Number</th>
                    <th>Course / Service</th>
                    <th>Payment Mode</th>
                    <th>Amount Paid (INR)</th>
                </tr>
        `;

        history.forEach(item => {
            excelContent += `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.receiptNo}</td>
                    <td>${item.name}</td>
                    <td>+91 ${item.phone}</td>
                    <td>${item.course}</td>
                    <td>${item.mode}</td>
                    <td>${item.amount}</td>
                </tr>
            `;
        });

        excelContent += `</table></body></html>`;

        const blob = new Blob([excelContent], { type: 'application/vnd.ms-excel' });
        const downloadUrl = URL.createObjectURL(blob);
        const virtualLink = document.createElement('a');
        
        virtualLink.href = downloadUrl;
        virtualLink.download = `Thanima_Driving_School_Billing_Report_${new Date().toISOString().slice(0,10)}.xls`;
        
        document.body.appendChild(virtualLink);
        virtualLink.click();
        document.body.removeChild(virtualLink);
    }

    function sendWhatsApp() {
        const receiptNo = document.getElementById('receiptNo').value;
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('whatsappNo').value.trim();
        const course = document.getElementById('course').value;
        const amount = document.getElementById('amount').value;
        const mode = document.getElementById('payMode').value;
        const date = new Date().toLocaleDateString('en-IN');

        if(!name || !phone || !amount) {
            alert('Please fill out all fields before launching WhatsApp.');
            return;
        }

        saveRecordToHistory();

        const baseUrl = window.location.origin + window.location.pathname;
        const invoiceUrl = `${baseUrl}?bill=true&no=${encodeURIComponent(receiptNo)}&dt=${encodeURIComponent(date)}&nm=${encodeURIComponent(name)}&cs=${encodeURIComponent(course)}&am=${encodeURIComponent(amount)}&md=${encodeURIComponent(mode)}`;

        const cleanPhone = '91' + phone.replace(/\D/g, '');
        const message = `*🧾 DIGITAL RECEIPT - THANIMA IYKARAYIL MOTOR DRIVING SCHOOL*%0A` +
                        `_Govt. Approved | LIC NO: 3/13/2019_%0A` +
                        `----------------------------------------%0A` +
                        `*Student Name:* ${name}%0A` +
                        `*Total Amount Paid: ₹ ${amount}*%0A` +
                        `----------------------------------------%0A%0A` +
                        `👉 Click the link below to view and download your full official receipt online:%0A${encodeURIComponent(invoiceUrl)}`;

        window.open(`https://api.whatsapp.com/send?phone=${cleanPhone}&text=${message}`, '_blank');
        
        // CRITICAL BUG FIXES COMPLETED HERE:
        document.getElementById('receiptForm').reset();
        document.getElementById('historySearch').value = '';
        generateNewReceiptNo(); // Re-ordered so reset doesn't overwrite it
        updatePreview();       // Runs preview refresh cleanly
    }

    function renderOnlineInvoiceMode(params) {
        document.body.classList.add('customer-view-mode');
        
        document.getElementById('previewHeader').innerText = "Official Digital Fee Receipt";
        document.getElementById('printFooterText').style.display = "block";
        document.getElementById('customerPrintBtn').style.display = "block";

        document.getElementById('previewReceiptNo').innerText = 'Receipt No: ' + params.get('no');
        document.getElementById('previewDate').innerText = 'Date: ' + params.get('dt');
        document.getElementById('previewName').innerText = params.get('nm');
        document.getElementById('previewCourse').innerText = params.get('cs');
        document.getElementById('previewMode').innerText = params.get('md');
        document.getElementById('previewAmount').innerText = '₹ ' + params.get('am');
    }
</script>
